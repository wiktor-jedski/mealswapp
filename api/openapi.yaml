# Implements DESIGN-002 SearchController, DESIGN-004 JobStatusTracker, DESIGN-006 AuthController, DESIGN-006 OAuthHandler, DESIGN-007 SubscriptionController, DESIGN-008 SavedDataRepository, DESIGN-010 RouteHandler and DESIGN-017 ErrorMessageMapper shared gateway contracts.
openapi: 3.1.0
info:
  title: Mealswapp API
  version: 0.3.0
  description: Shared gateway source of truth for Phase 03 authentication and gateway contracts.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
security: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Process liveness check
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
  /ready:
    get:
      operationId: getReady
      summary: Dependency readiness check
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/health:
    get:
      operationId: getApiV1Health
      summary: Versioned process liveness check
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ready:
    get:
      operationId: getApiV1Ready
      summary: Versioned dependency readiness check
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/auth/csrf-token:
    get:
      operationId: getApiV1AuthCsrfToken
      summary: Obtain a session-bound CSRF synchronizer token
      responses:
        "200":
          description: CSRF token delivery envelope. HttpOnly CSRF cookies are set separately.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CSRFTokenEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /api/v1/auth/register:
    post:
      operationId: postApiV1AuthRegister
      summary: Register with email, password, and current consent versions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          $ref: "#/components/responses/AuthSession"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /api/v1/auth/login:
    post:
      operationId: postApiV1AuthLogin
      summary: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          $ref: "#/components/responses/AuthSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /api/v1/auth/logout:
    post:
      operationId: postApiV1AuthLogout
      summary: Revoke the current refresh session and clear auth cookies
      security:
        - cookieAuth: []
          csrfHeader: []
      responses:
        "204":
          description: Session cleared.
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /api/v1/auth/refresh:
    post:
      operationId: postApiV1AuthRefresh
      summary: Rotate the refresh token and issue a fresh access token
      security:
        - refreshCookie: []
      responses:
        "200":
          $ref: "#/components/responses/AuthSession"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/verify-email:
    post:
      operationId: postApiV1AuthVerifyEmail
      summary: Mark the authenticated email login method verified
      security:
        - cookieAuth: []
          csrfHeader: []
      responses:
        "200":
          description: Verified-login projection update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyEmailEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /api/v1/auth/password-reset/request:
    post:
      operationId: postApiV1AuthPasswordResetRequest
      summary: Request a password reset without revealing account existence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Generic password-reset request acceptance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetRequestEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /api/v1/auth/password-reset/consume:
    post:
      operationId: postApiV1AuthPasswordResetConsume
      summary: Consume a single-use reset token and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConsumeRequest"
      responses:
        "200":
          description: Password reset completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetConsumeEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/oauth/{provider}/start:
    get:
      operationId: getApiV1AuthOAuthStart
      summary: Start Google or Apple OAuth login
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
        - name: return_to
          in: query
          required: false
          description: Safe relative frontend path to return to after provider callback. Absolute URLs are ignored by the server.
          schema:
            type: string
            example: /subscription
      responses:
        "302":
          description: Redirect to provider authorization URL.
          headers:
            Location:
              schema:
                type: string
                format: uri
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/auth/oauth/{provider}/callback:
    get:
      operationId: getApiV1AuthOAuthCallback
      summary: Complete Google or Apple OAuth login
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect back to the configured frontend origin after authenticated cookies are set.
          headers:
            Location:
              schema:
                type: string
                format: uri
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/profile:
    get:
      operationId: getApiV1Profile
      summary: Read authenticated profile and preferences
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Profile"
        "401":
          $ref: "#/components/responses/Error"
    put:
      operationId: putApiV1Profile
      summary: Update authenticated profile preferences
      security:
        - cookieAuth: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          $ref: "#/components/responses/Profile"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /api/v1/saved-items:
    get:
      operationId: getApiV1SavedItems
      summary: List authenticated saved items
      security:
        - cookieAuth: []
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [favorite, saved_meal, saved_diet]
      responses:
        "200":
          $ref: "#/components/responses/SavedItems"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/saved-items/{kind}/{itemId}:
    delete:
      operationId: deleteApiV1SavedItem
      summary: Delete one saved item
      security:
        - cookieAuth: []
          csrfHeader: []
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [favorite, saved_meal, saved_diet]
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Saved item deleted.
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/search-history:
    get:
      operationId: getApiV1SearchHistory
      summary: List latest authenticated search history
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/SearchHistory"
        "401":
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteApiV1SearchHistory
      summary: Clear authenticated search history
      security:
        - cookieAuth: []
          csrfHeader: []
      responses:
        "204":
          description: Search history cleared.
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
  /api/v1/search:
    post:
      operationId: postApiV1Search
      summary: Search catalog food objects, substitutions, or daily-diet alternatives
      description: Optional cookie authentication associates completed searches with authenticated search history; anonymous requests are accepted.
      security:
        - {}
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          $ref: "#/components/responses/Search"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/SearchRejected"
        "429":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/search/autocomplete:
    get:
      operationId: getApiV1SearchAutocomplete
      summary: Return ranked food and meal autocomplete suggestions
      description: Optional cookie authentication scopes autocomplete candidate visibility when a session is present.
      security:
        - {}
        - cookieAuth: []
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1
      responses:
        "200":
          $ref: "#/components/responses/Autocomplete"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/food-objects/{id}:
    get:
      operationId: getApiV1FoodObject
      summary: Return one food object for selected-item hydration
      description: Optional cookie authentication scopes food-object visibility when a session is present.
      security:
        - {}
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          $ref: "#/components/responses/FoodObject"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/account/export:
    get:
      operationId: getApiV1AccountExport
      summary: Export authenticated account data
      security:
        - cookieAuth: []
      parameters:
        - name: format
          in: query
          required: false
          schema:
            allOf:
              - $ref: "#/components/schemas/ExportFormat"
            default: json
      responses:
        "200":
          description: Account export payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportBundle"
            text/csv:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/account:
    delete:
      operationId: deleteApiV1Account
      summary: Request authenticated account deletion
      security:
        - cookieAuth: []
          csrfHeader: []
      responses:
        "200":
          $ref: "#/components/responses/DeletionRequest"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  # Implements DESIGN-008 SavedDataRepository daily-diet collection contract.
  /api/v1/daily-diets:
    get:
      operationId: getApiV1DailyDiets
      summary: List the authenticated user's saved daily diets
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/DailyDietCollection"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
    post:
      operationId: postApiV1DailyDiet
      summary: Create an authenticated user's saved daily diet
      description: Creates a user-owned collection. The server derives ownership and aggregate macros from the authenticated session and persisted meal data; clients cannot submit user IDs or authoritative totals.
      security:
        - cookieAuth: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyDietCreateRequest"
      responses:
        "201":
          $ref: "#/components/responses/DailyDiet"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
  # Implements DESIGN-008 SavedDataRepository daily-diet item contract.
  /api/v1/daily-diets/{dietId}:
    parameters:
      - $ref: "#/components/parameters/DailyDietId"
    get:
      operationId: getApiV1DailyDiet
      summary: Read one authenticated user's saved daily diet
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/DailyDiet"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
    put:
      operationId: putApiV1DailyDiet
      summary: Replace an authenticated user's saved daily diet
      description: Replaces the user-owned collection and returns server-derived aggregate macros. The request contains meal quantities only; it cannot override ownership or totals.
      security:
        - cookieAuth: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyDietReplaceRequest"
      responses:
        "200":
          $ref: "#/components/responses/DailyDiet"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteApiV1DailyDiet
      summary: Delete an authenticated user's saved daily diet
      security:
        - cookieAuth: []
          csrfHeader: []
      responses:
        "204":
          description: Saved daily diet deleted.
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
  # Implements DESIGN-004 JobStatusTracker optimization submission contract.
  /api/v1/optimization/jobs:
    post:
      operationId: postApiV1OptimizationJob
      summary: Submit a saved daily diet for asynchronous optimization
      description: Enqueues a server-owned saved diet for optimization. The server reloads the diet under the authenticated user; the client supplies only target constraints and exclusions, never original meal data, user IDs, or authoritative macro totals.
      security:
        - cookieAuth: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietOptimizationRequest"
      responses:
        "202":
          $ref: "#/components/responses/OptimizationJobAcknowledgement"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
  # Implements DESIGN-004 JobStatusTracker polling contract.
  /api/v1/optimization/jobs/{jobId}:
    parameters:
      - $ref: "#/components/parameters/OptimizationJobId"
    get:
      operationId: getApiV1OptimizationJob
      summary: Poll an authenticated user's optimization job
      description: Returns only the current user's job. A job belonging to another user is indistinguishable from a missing job; expired completed results return a stable expired error.
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/OptimizationJobStatus"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "410":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
  /api/v1/billing/entitlement:
    get:
      operationId: getApiV1BillingEntitlement
      summary: Read authenticated entitlement and billing recovery status
      description: Returns frontend-safe entitlement state for the current user. Provider customer, subscription, secret, and payment-card fields are never exposed.
      security:
        - cookieAuth: []
      responses:
        "200":
          $ref: "#/components/responses/EntitlementStatus"
        "401":
          $ref: "#/components/responses/Error"
        "402":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/billing/checkout:
    post:
      operationId: postApiV1BillingCheckout
      summary: Create or replay a Stripe-hosted subscription checkout session
      description: Creates a provider-hosted checkout session for the authenticated user. Clients must send a stable `Idempotency-Key`; exact retries with the same normalized body return the stored checkout response, while reusing the key with a different normalized body returns 409. Raw payment-card fields such as PAN or CVC are never accepted by this API.
      security:
        - cookieAuth: []
          csrfHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutCreateRequest"
      responses:
        "200":
          $ref: "#/components/responses/CheckoutSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "402":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/billing/portal:
    post:
      operationId: postApiV1BillingPortal
      summary: Create a Stripe-hosted billing portal session
      description: Creates a provider-hosted customer portal session for the authenticated user's active paid subscription. Provider customer and subscription IDs remain server-side.
      security:
        - cookieAuth: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingPortalCreateRequest"
      responses:
        "200":
          $ref: "#/components/responses/BillingPortalSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/billing/stripe/webhook:
    post:
      operationId: postApiV1BillingStripeWebhook
      summary: Receive Stripe subscription and payment webhooks
      description: Accepts raw Stripe webhook payloads signed with `Stripe-Signature`. The signature is required and verified against the configured Stripe webhook secret before parsing; provider event IDs are processed idempotently so Stripe retries and duplicate deliveries do not duplicate entitlement history or usage effects.
      parameters:
        - $ref: "#/components/parameters/StripeSignature"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeWebhookEvent"
      responses:
        "200":
          $ref: "#/components/responses/StripeWebhook"
        "400":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/disclaimers:
    get:
      operationId: getApiV1Disclaimers
      summary: Retrieve login or account disclaimer content
      parameters:
        - name: location
          in: query
          required: false
          schema:
            type: string
            enum: [login, account]
            default: login
      responses:
        "200":
          $ref: "#/components/responses/Disclaimer"
        "400":
          $ref: "#/components/responses/Error"
components:
  parameters:
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [google, apple]
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Stable client-generated key for retrying an authenticated mutation. The key is scoped to the authenticated user, HTTP method, route, and normalized request body; it never carries a user ID.
      schema:
        type: string
        minLength: 8
        maxLength: 255
    DailyDietId:
      name: dietId
      in: path
      required: true
      description: User-owned saved daily-diet identifier. Ownership is derived from the authenticated session.
      schema:
        type: string
        format: uuid
    OptimizationJobId:
      name: jobId
      in: path
      required: true
      description: User-owned optimization job identifier. Ownership is derived from the authenticated session.
      schema:
        type: string
        format: uuid
    StripeSignature:
      name: Stripe-Signature
      in: header
      required: true
      description: Stripe webhook signature header. Requests without a valid timestamped signature are rejected before any entitlement mutation.
      schema:
        type: string
        minLength: 1
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: mealswapp_access
    refreshCookie:
      type: apiKey
      in: cookie
      name: mealswapp_refresh
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
  responses:
    Success:
      description: Successful gateway envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    AuthSession:
      description: Authenticated session envelope. Access and refresh token values are set only as HttpOnly cookies.
      headers:
        Set-Cookie:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthSessionEnvelope"
    Error:
      description: User-safe gateway error envelope reused by operation-level error responses.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    # Implements DESIGN-004 JobStatusTracker and DESIGN-010 RateLimiter shared admission contract.
    TooManyRequests:
      description: Retryable rate or admission rejection with a positive whole-second delay.
      headers:
        Retry-After:
          required: true
          description: Positive whole seconds before the caller should retry.
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    Profile:
      description: Profile envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProfileEnvelope"
    SavedItems:
      description: Saved items envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SavedItemsEnvelope"
    DailyDiet:
      description: User-owned saved daily-diet collection with server-derived aggregate macros.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DailyDietEnvelope"
    DailyDietCollection:
      description: User-owned saved daily-diet collection list.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DailyDietCollectionEnvelope"
    OptimizationJobAcknowledgement:
      description: Asynchronous optimization accepted for processing. No result is available in the acknowledgement.
      headers:
        Location:
          description: Relative polling URL for the accepted optimization job.
          schema:
            type: string
            format: uri-reference
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OptimizationJobAcknowledgementEnvelope"
    OptimizationJobStatus:
      description: User-scoped optimization job polling response. Completed results contain at most three server-validated alternatives.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OptimizationJobStatusEnvelope"
    SearchHistory:
      description: Search history envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SearchHistoryEnvelope"
    Search:
      description: Search response envelope with results, similarity metadata, warnings, and cache metadata.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SearchResponseEnvelope"
    FoodObject:
      description: Food-object detail envelope for selected-item hydration.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FoodObjectEnvelope"
    Autocomplete:
      description: Autocomplete response envelope with ranked suggestions and cache metadata.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AutocompleteEnvelope"
    SearchRejected:
      description: Valid search request rejected by user-facing search constraint rules.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SearchRejectionEnvelope"
    DeletionRequest:
      description: Deletion request envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeletionRequestEnvelope"
    Disclaimer:
      description: Disclaimer content envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DisclaimerEnvelope"
    EntitlementStatus:
      description: Sanitized entitlement and billing status envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EntitlementStatusEnvelope"
    CheckoutSession:
      description: Sanitized Stripe-hosted checkout response envelope. Contains no raw payment-card data.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CheckoutSessionEnvelope"
    BillingPortalSession:
      description: Sanitized Stripe-hosted billing portal response envelope. Contains no provider customer or subscription identifiers.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BillingPortalSessionEnvelope"
    StripeWebhook:
      description: Verified Stripe webhook processing result. Duplicate provider events return 200 with duplicate set to true.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StripeWebhookEnvelope"
  schemas:
    AppError:
      type: object
      required: [category, code, message, retryable]
      properties:
        category:
          type: string
          enum: [validation, auth, entitlement, security, network, timeout, server, dependency, rate_limit, unknown]
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        requestId:
          type: string
    Envelope:
      type: object
      required: [status, requestId]
      properties:
        status:
          type: string
          enum: [ok, error, ready, not_ready]
        requestId:
          type: string
        data:
          type: object
          additionalProperties: true
        error:
          oneOf:
            - $ref: "#/components/schemas/AppError"
            - type: "null"
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, privacyPolicyVersion, termsVersion]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        privacyPolicyVersion:
          type: string
        termsVersion:
          type: string
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    PasswordResetRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetConsumeRequest:
      type: object
      additionalProperties: false
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 32
        newPassword:
          type: string
          minLength: 12
    AuthSessionData:
      type: object
      required: [userId, role, hasVerifiedLoginMethod, accessExpiresAt, refreshExpiresAt]
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, admin]
        hasVerifiedLoginMethod:
          type: boolean
        accessExpiresAt:
          type: string
          format: date-time
        refreshExpiresAt:
          type: string
          format: date-time
    AuthSessionEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/AuthSessionData"
    CSRFTokenEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [csrfToken]
          properties:
            csrfToken:
              type: string
    VerifyEmailEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [hasVerifiedLoginMethod]
          properties:
            hasVerifiedLoginMethod:
              type: boolean
              const: true
    PasswordResetRequestEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [accepted]
          additionalProperties: false
          properties:
            accepted:
              type: boolean
              const: true
    PasswordResetConsumeEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [reset]
          properties:
            reset:
              type: boolean
              const: true
    ProfileUpdateRequest:
      type: object
      additionalProperties: false
      required: [unitSystem, themePreference]
      properties:
        displayName:
          type: string
        unitSystem:
          type: string
          enum: [metric, imperial]
        themePreference:
          type: string
          enum: [system, light, dark]
    ProfileEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [userId, displayName, unitSystem, themePreference, requiresUnitRecalculation]
          properties:
            userId:
              type: string
              format: uuid
            displayName:
              type: string
            unitSystem:
              type: string
              enum: [metric, imperial]
            themePreference:
              type: string
              enum: [system, light, dark]
            requiresUnitRecalculation:
              type: boolean
    SavedItem:
      type: object
      required: [id, itemId, kind]
      properties:
        id:
          type: string
          format: uuid
        itemId:
          type: string
          format: uuid
        kind:
          type: string
          enum: [favorite, saved_meal, saved_diet]
    SavedItemsEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SavedItem"
    # Implements DESIGN-008 SavedDataRepository daily-diet quantity contract.
    CanonicalQuantityUnit:
      type: string
      enum: [g, ml, oz, fl_oz]
      description: Canonical mass or volume unit accepted by saved-diet entries.
    MealQuantity:
      type: object
      additionalProperties: false
      required: [mealId, quantity, unit, position]
      properties:
        mealId:
          type: string
          format: uuid
        quantity:
          type: number
          exclusiveMinimum: 0
          maximum: 1000000
          multipleOf: 0.001
          description: Positive finite quantity. The server validates finiteness before persistence or solving.
        unit:
          $ref: "#/components/schemas/CanonicalQuantityUnit"
        position:
          type: integer
          minimum: 0
          maximum: 99
    DailyDietMealEntry:
      type: object
      additionalProperties: false
      required: [id, mealId, quantity, unit, position]
      properties:
        id:
          type: string
          format: uuid
        mealId:
          type: string
          format: uuid
        quantity:
          type: number
          exclusiveMinimum: 0
          maximum: 1000000
          multipleOf: 0.001
        unit:
          $ref: "#/components/schemas/CanonicalQuantityUnit"
        position:
          type: integer
          minimum: 0
          maximum: 99
    MacroProjection:
      type: object
      additionalProperties: false
      required: [protein, carbohydrates, fat, calories]
      description: Server-derived one-day aggregate macro and calorie projection; clients cannot submit or override these values.
      properties:
        protein:
          type: number
          minimum: 0
          maximum: 1000000000
        carbohydrates:
          type: number
          minimum: 0
          maximum: 1000000000
        fat:
          type: number
          minimum: 0
          maximum: 1000000000
        calories:
          type: number
          minimum: 0
          maximum: 1000000000
    DailyDiet:
      type: object
      additionalProperties: false
      required: [id, name, entries, aggregateMacros, createdAt, updatedAt]
      description: User-owned saved daily diet. The authenticated session, not a client field, determines ownership.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 120
        entries:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/DailyDietMealEntry"
        aggregateMacros:
          $ref: "#/components/schemas/MacroProjection"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DailyDietCreateRequest:
      type: object
      additionalProperties: false
      required: [name, entries]
      description: Client-editable saved-diet fields. It intentionally has no userId or aggregate macro fields.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        entries:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/MealQuantity"
    DailyDietReplaceRequest:
      type: object
      additionalProperties: false
      required: [name, entries]
      description: Client-editable replacement fields. Aggregate macros are recalculated by the server.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        entries:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/MealQuantity"
    DailyDietEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/DailyDiet"
    DailyDietCollectionEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          additionalProperties: false
          required: [diets]
          properties:
            diets:
              type: array
              items:
                $ref: "#/components/schemas/DailyDiet"
    # Implements DESIGN-004 JobStatusTracker optimization contract.
    OptimizationStatus:
      type: string
      enum: [queued, processing, completed, failed, cancelled]
    OptimizationFailureCode:
      type: string
      enum: [failed_validation, solver_timeout, solver_infeasible, worker_crash]
      description: Stable terminal job-failure code. Queue outages are retryable submission errors, expiry is a 410 polling error, and internal diagnostics are never returned.
    DietOptimizationRequest:
      type: object
      additionalProperties: false
      required: [dailyDietId, tolerancePercent, excludedMealIds]
      description: Optimization constraints for one server-owned saved daily diet. Original meal data and authoritative aggregate targets are loaded and calculated by the server.
      properties:
        dailyDietId:
          type: string
          format: uuid
        tolerancePercent:
          type: number
          minimum: 0
          maximum: 100
          multipleOf: 0.1
          description: Allowed percentage deviation around each server-derived saved-diet macro target.
        excludedMealIds:
          type: array
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            format: uuid
    OptimizationAlternative:
      type: object
      additionalProperties: false
      required: [meals, macros, similarityScore]
      description: Server-validated alternative with recalculated aggregate macros; no client totals are accepted.
      properties:
        meals:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/MealQuantity"
        macros:
          $ref: "#/components/schemas/MacroProjection"
        similarityScore:
          type: number
          minimum: 0
          maximum: 1
          multipleOf: 0.0001
          description: Quantity-weighted Jaccard similarity between original and alternative meal quantities after conversion to canonical g/ml, rounded to four decimal places.
    OptimizationFailure:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/OptimizationFailureCode"
        message:
          type: string
          minLength: 1
          maxLength: 240
          description: User-safe failure message with no solver, queue, or persistence internals.
    OptimizationJobAcknowledgementData:
      type: object
      additionalProperties: false
      required: [jobId, status, pollUrl]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued]
        pollUrl:
          type: string
          format: uri-reference
          minLength: 1
    OptimizationJobAcknowledgementEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [accepted]
        requestId:
          type: string
          minLength: 1
          maxLength: 120
          pattern: '^[A-Za-z0-9._:-]+$'
        data:
          $ref: "#/components/schemas/OptimizationJobAcknowledgementData"
    OptimizationJobData:
      oneOf:
        - $ref: "#/components/schemas/OptimizationJobQueued"
        - $ref: "#/components/schemas/OptimizationJobProcessing"
        - $ref: "#/components/schemas/OptimizationJobCompleted"
        - $ref: "#/components/schemas/OptimizationJobFailed"
        - $ref: "#/components/schemas/OptimizationJobCancelled"
      discriminator:
        propertyName: status
        mapping:
          queued: "#/components/schemas/OptimizationJobQueued"
          processing: "#/components/schemas/OptimizationJobProcessing"
          completed: "#/components/schemas/OptimizationJobCompleted"
          failed: "#/components/schemas/OptimizationJobFailed"
          cancelled: "#/components/schemas/OptimizationJobCancelled"
      description: User-scoped job state discriminated by status. Completed results expire after the documented result TTL.
    OptimizationJobQueued:
      type: object
      additionalProperties: false
      required: [jobId, dailyDietId, status, pollUrl, createdAt]
      properties:
        jobId:
          type: string
          format: uuid
        dailyDietId:
          type: string
          format: uuid
        status:
          allOf:
            - $ref: "#/components/schemas/OptimizationStatus"
            - const: queued
        pollUrl:
          type: string
          format: uri-reference
          minLength: 1
        createdAt:
          type: string
          format: date-time
    OptimizationJobProcessing:
      type: object
      additionalProperties: false
      required: [jobId, dailyDietId, status, pollUrl, createdAt, startedAt]
      properties:
        jobId:
          type: string
          format: uuid
        dailyDietId:
          type: string
          format: uuid
        status:
          allOf:
            - $ref: "#/components/schemas/OptimizationStatus"
            - const: processing
        pollUrl:
          type: string
          format: uri-reference
          minLength: 1
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
    OptimizationJobCompleted:
      type: object
      additionalProperties: false
      required: [jobId, dailyDietId, status, pollUrl, createdAt, startedAt, finishedAt, alternatives]
      properties:
        jobId:
          type: string
          format: uuid
        dailyDietId:
          type: string
          format: uuid
        status:
          allOf:
            - $ref: "#/components/schemas/OptimizationStatus"
            - const: completed
        pollUrl:
          type: string
          format: uri-reference
          minLength: 1
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        alternatives:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: "#/components/schemas/OptimizationAlternative"
    OptimizationJobFailed:
      type: object
      additionalProperties: false
      required: [jobId, dailyDietId, status, pollUrl, createdAt, failure]
      properties:
        jobId:
          type: string
          format: uuid
        dailyDietId:
          type: string
          format: uuid
        status:
          allOf:
            - $ref: "#/components/schemas/OptimizationStatus"
            - const: failed
        pollUrl:
          type: string
          format: uri-reference
          minLength: 1
        createdAt:
          type: string
          format: date-time
        startedAt:
          type:
            - string
            - "null"
          format: date-time
        finishedAt:
          type:
            - string
            - "null"
          format: date-time
        alternatives:
          type: array
          maxItems: 3
          items:
            $ref: "#/components/schemas/OptimizationAlternative"
        failure:
          $ref: "#/components/schemas/OptimizationFailure"
    OptimizationJobCancelled:
      type: object
      additionalProperties: false
      required: [jobId, dailyDietId, status, pollUrl, createdAt, finishedAt]
      properties:
        jobId:
          type: string
          format: uuid
        dailyDietId:
          type: string
          format: uuid
        status:
          allOf:
            - $ref: "#/components/schemas/OptimizationStatus"
            - const: cancelled
        pollUrl:
          type: string
          format: uri-reference
          minLength: 1
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
    OptimizationJobStatusEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
          minLength: 1
          maxLength: 120
          pattern: '^[A-Za-z0-9._:-]+$'
        data:
          $ref: "#/components/schemas/OptimizationJobData"
    SearchHistoryEntry:
      type: object
      required: [id, query, mode, filtersHash]
      properties:
        id:
          type: string
          format: uuid
        query:
          type: string
        mode:
          type: string
        filtersHash:
          type: string
    SearchHistoryEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [history]
          properties:
            history:
              type: array
              items:
                $ref: "#/components/schemas/SearchHistoryEntry"
    SearchMode:
      type: string
      enum: [catalog, substitution, daily_diet, daily_diet_alternative]
    SearchFilterKind:
      type: string
      enum: [food_category, culinary_role, physical_state, allergen, dietary_preset]
    SearchFilter:
      type: object
      additionalProperties: false
      required: [filterId, kind, include]
      properties:
        filterId:
          type: string
          minLength: 1
        kind:
          $ref: "#/components/schemas/SearchFilterKind"
        include:
          type: boolean
    SubstitutionInput:
      type: object
      additionalProperties: false
      required: [foodObjectId, quantity, unit]
      properties:
        foodObjectId:
          type: string
          format: uuid
        quantity:
          type: number
          exclusiveMinimum: 0
        unit:
          $ref: "#/components/schemas/CanonicalQuantityUnit"
    SearchRequest:
      type: object
      additionalProperties: false
      required: [query, mode, page]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 200
        mode:
          $ref: "#/components/schemas/SearchMode"
        filters:
          type: array
          maxItems: 20
          default: []
          items:
            $ref: "#/components/schemas/SearchFilter"
        page:
          type: integer
          minimum: 1
          maximum: 10000
        substitutionInputs:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/SubstitutionInput"
        dailyDietId:
          type: string
          format: uuid
    # Implements DESIGN-002 SearchController classification summary contract.
    ClassificationSummary:
      type: object
      additionalProperties: false
      required: [id, name, kind]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        kind:
          type: string
          enum: [food_category, culinary_role]
    # Implements DESIGN-002 SearchController macro profile contract.
    MacroProfile:
      type: object
      additionalProperties: false
      required: [protein, carbohydrates, fat]
      properties:
        protein:
          type: number
          minimum: 0
        carbohydrates:
          type: number
          minimum: 0
        fat:
          type: number
          minimum: 0
    # Implements DESIGN-002 SearchController substitution source summary contract.
    SourceSummary:
      type: object
      additionalProperties: false
      required: [macros, calories, totalGrams, totalMilliliters]
      properties:
        macros:
          $ref: "#/components/schemas/MacroProfile"
        calories:
          type: number
          minimum: 0
        totalGrams:
          type: number
          minimum: 0
        totalMilliliters:
          type: number
          minimum: 0
    # Implements DESIGN-002 SearchController food-object result contract.
    FoodObject:
      type: object
      additionalProperties: false
      required: [id, name, physicalState, classifications, primaryFoodCategory, macros, macroBasis, calories]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        physicalState:
          type: string
          enum: [solid, liquid]
        imageUrl:
          type:
            - string
            - "null"
          format: uri-reference
        classifications:
          type: array
          items:
            $ref: "#/components/schemas/ClassificationSummary"
        primaryFoodCategory:
          oneOf:
            - $ref: "#/components/schemas/ClassificationSummary"
            - type: "null"
        macros:
          $ref: "#/components/schemas/MacroProfile"
        macroBasis:
          type: string
          enum: [100g, 100ml]
        calories:
          type: number
          minimum: 0
    SimilarityTier:
      type: string
      enum: [excellent, good, fair, poor]
    SimilarityMetadata:
      type: object
      required: [itemId, score, tier, imageUrl, matchingQuantity]
      properties:
        itemId:
          type: string
          format: uuid
        score:
          type: number
          minimum: 0
          maximum: 1
        tier:
          $ref: "#/components/schemas/SimilarityTier"
        imageUrl:
          type: string
          format: uri-reference
        matchingQuantity:
          type: number
          minimum: 0
    CacheMetadata:
      type: object
      required: [status, namespace, schemaVersion, ttlSeconds]
      properties:
        status:
          type: string
          enum: [hit, miss]
        namespace:
          type: string
        schemaVersion:
          type: string
        ttlSeconds:
          type: integer
          minimum: 0
    SearchRejection:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        field:
          type: string
    SearchResponse:
      type: object
      required: [items, totalCount, page, similarityScores, similarityMetadata, warnings]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FoodObject"
        totalCount:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        similarityScores:
          type: array
          items:
            type: number
            minimum: 0
            maximum: 1
        similarityMetadata:
          type: array
          items:
            $ref: "#/components/schemas/SimilarityMetadata"
        sourceSummary:
          $ref: "#/components/schemas/SourceSummary"
        warnings:
          type: array
          description: Degraded or diagnostic search warnings. Values can include stable warning codes such as cache_unavailable and contextual diagnostics such as excluded filters or skipped similarity targets.
          items:
            type: string
          example: [cache_unavailable, excluded allergen dairy]
        cache:
          $ref: "#/components/schemas/CacheMetadata"
    SearchResponseEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/SearchResponse"
    FoodObjectEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/FoodObject"
    SearchRejectionEnvelope:
      type: object
      required: [status, requestId, data, error]
      properties:
        status:
          type: string
          enum: [error]
        requestId:
          type: string
        data:
          type: object
          required: [rejection]
          properties:
            rejection:
              $ref: "#/components/schemas/SearchRejection"
        error:
          $ref: "#/components/schemas/AppError"
    RankedAutocomplete:
      type: object
      required: [itemId, label, exactMatch, levenshteinDistance, length, rank]
      properties:
        itemId:
          type: string
          format: uuid
        label:
          type: string
        exactMatch:
          type: boolean
        levenshteinDistance:
          type: integer
          minimum: 0
        length:
          type: integer
          minimum: 0
        rank:
          type: integer
          minimum: 1
    AutocompleteResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RankedAutocomplete"
        cache:
          $ref: "#/components/schemas/CacheMetadata"
    AutocompleteEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/AutocompleteResponse"
    ExportBundle:
      type: object
      required: [user, consent, savedItems, history, customItems]
      properties:
        user:
          type: object
          additionalProperties: true
        consent:
          type: array
          items:
            type: object
            additionalProperties: true
        savedItems:
          type: array
          items:
            $ref: "#/components/schemas/SavedItem"
        history:
          type: array
          items:
            $ref: "#/components/schemas/SearchHistoryEntry"
        customItems:
          type: array
          items:
            type: object
            additionalProperties: true
    ExportFormat:
      type: string
      enum: [json, csv]
    DeletionRequestEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [requestId, status]
          properties:
            requestId:
              type: string
              format: uuid
            status:
              type: string
              enum: [pending, processing, completed, failed]
    DisclaimerEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          type: object
          required: [location, version, markdown, fallback]
          properties:
            location:
              type: string
              enum: [login, account]
            version:
              type: string
            markdown:
              type: string
            fallback:
              type: boolean
            alert:
              type: string
    CheckoutPlan:
      type: string
      enum: [monthly, annual]
    CheckoutCreateRequest:
      type: object
      additionalProperties: false
      required: [plan, successUrl, cancelUrl]
      properties:
        plan:
          $ref: "#/components/schemas/CheckoutPlan"
        successUrl:
          type: string
          format: uri
          description: Absolute HTTP or HTTPS URL used by Stripe after successful checkout. URL fragments are rejected.
        cancelUrl:
          type: string
          format: uri
          description: Absolute HTTP or HTTPS URL used by Stripe when checkout is cancelled. URL fragments are rejected.
    CheckoutSessionData:
      type: object
      additionalProperties: false
      required: [checkoutSessionId, checkoutUrl, plan, priceId, amountCents]
      properties:
        checkoutSessionId:
          type: string
          minLength: 1
        checkoutUrl:
          type: string
          format: uri
        plan:
          $ref: "#/components/schemas/CheckoutPlan"
        priceId:
          type: string
          minLength: 1
          description: Public Stripe price identifier selected by the server for the requested plan.
        amountCents:
          type: integer
          minimum: 0
    CheckoutSessionEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/CheckoutSessionData"
    BillingPortalCreateRequest:
      type: object
      additionalProperties: false
      required: [returnUrl]
      properties:
        returnUrl:
          type: string
          format: uri
          description: Absolute HTTP or HTTPS URL used by Stripe Billing Portal to return to the application. URL fragments are rejected.
    BillingPortalSessionData:
      type: object
      additionalProperties: false
      required: [portalUrl]
      properties:
        portalUrl:
          type: string
          format: uri
    BillingPortalSessionEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/BillingPortalSessionData"
    StripeWebhookEvent:
      type: object
      additionalProperties: true
      required: [id, type, data]
      properties:
        id:
          type: string
          minLength: 1
          description: Stripe provider event identifier used for idempotent webhook processing.
        type:
          type: string
          enum:
            - checkout.session.completed
            - invoice.payment_succeeded
            - invoice.payment_failed
            - customer.subscription.created
            - customer.subscription.updated
            - customer.subscription.deleted
        data:
          type: object
          required: [object]
          properties:
            object:
              type: object
              additionalProperties: true
              description: Stripe object payload. Only allow-listed user, customer, subscription, metadata, and status fields are consumed after signature verification.
    StripeWebhookData:
      type: object
      additionalProperties: false
      required: [eventId, eventType, duplicate]
      properties:
        eventId:
          type: string
        eventType:
          type: string
        duplicate:
          type: boolean
          description: True when the provider event ID was already processed and no duplicate entitlement side effects were applied.
    StripeWebhookEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/StripeWebhookData"
    SubscriptionTier:
      type: string
      enum: [free, trial, paid]
    EntitlementState:
      type: string
      enum: [active, expired, past_due, cancelled]
    BillingRecoveryState:
      type: string
      enum: [none, action_required, cancelled, expired]
    EntitlementStatusData:
      type: object
      additionalProperties: false
      required:
        - userId
        - tier
        - status
        - allowedModes
        - searchLimitPer24h
        - usageUsed
        - usageRemaining
        - usageWindowStartedAt
        - trialExpiresAt
        - billingRecoveryState
      properties:
        userId:
          type: string
          format: uuid
        tier:
          $ref: "#/components/schemas/SubscriptionTier"
        status:
          $ref: "#/components/schemas/EntitlementState"
        allowedModes:
          type: array
          items:
            $ref: "#/components/schemas/SearchMode"
        searchLimitPer24h:
          type: integer
          minimum: 0
        usageUsed:
          type: integer
          minimum: 0
        usageRemaining:
          type:
            - integer
            - "null"
          minimum: 0
        usageWindowStartedAt:
          type:
            - string
            - "null"
          format: date-time
        trialExpiresAt:
          type:
            - string
            - "null"
          format: date-time
        billingRecoveryState:
          $ref: "#/components/schemas/BillingRecoveryState"
    EntitlementStatusEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
          enum: [ok]
        requestId:
          type: string
        data:
          $ref: "#/components/schemas/EntitlementStatusData"
