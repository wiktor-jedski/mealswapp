# Implements DESIGN-010 RouteHandler and DESIGN-017 ErrorMessageMapper shared gateway contracts.
openapi: 3.1.0
info:
  title: Mealswapp API
  version: 0.3.0
  description: Shared gateway source of truth. Domain contracts extend this document in later phases.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
# Public gateway operations opt out explicitly; protected domain operations override this.
security: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Process liveness check
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
  /ready:
    get:
      operationId: getReady
      summary: Dependency readiness check
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/health:
    get:
      operationId: getApiV1Health
      summary: Versioned process liveness check
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ready:
    get:
      operationId: getApiV1Ready
      summary: Versioned dependency readiness check
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/auth/csrf-token:
    get:
      operationId: getApiV1AuthCsrfToken
      summary: Obtain a session-bound CSRF synchronizer token for SPA mutation requests
      responses:
        "200":
          description: CSRF token delivery envelope. The HttpOnly CSRF cookie is set separately.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CSRFTokenEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
components:
  responses:
    Success:
      description: Successful gateway envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    Error:
      description: User-safe gateway error. Includes 403, 429 with Retry-After, 503, and 504 responses.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
  schemas:
    AppError:
      type: object
      required: [category, code, message, retryable]
      properties:
        category:
          type: string
          enum: [validation, auth, entitlement, network, timeout, server, dependency, unknown]
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        requestId:
          type: string
    Envelope:
      type: object
      required: [status, requestId]
      properties:
        status:
          type: string
        requestId:
          type: string
        data:
          type: object
          additionalProperties: true
        error:
          oneOf:
            - $ref: "#/components/schemas/AppError"
            - type: "null"
    CSRFTokenEnvelope:
      type: object
      required: [status, requestId, data]
      properties:
        status:
          type: string
        requestId:
          type: string
        data:
          type: object
          required: [csrfToken]
          properties:
            csrfToken:
              type: string
